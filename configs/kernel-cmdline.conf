# Add to your bootloader's kernel command line:
# For Limine: add to KERNEL_CMDLINE in /etc/default/limine
# For GRUB: add to GRUB_CMDLINE_LINUX in /etc/default/grub
# For systemd-boot: add to options in /boot/loader/entries/*.conf

# Force EDID override with VRR range limits (required until kernel patches land)
drm.edid_firmware=eDP-1:edid/vrr.bin

# Enable Intel DPCD backlight interface for OLED panels
xe.enable_dpcd_backlight=3
